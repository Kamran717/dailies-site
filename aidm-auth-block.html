<!-- ===== SUPABASE AUTH (email) ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  #aidm-auth{ margin-left:auto; display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .aidm-balance{ font-family:var(--ff-mono); font-size:12px; font-weight:600; letter-spacing:.03em; text-transform:uppercase; background:none; color:var(--amber); border:1px solid var(--line); padding:9px 14px; white-space:nowrap; margin-right:6px; }
  #aidm-thanks-ov{ display:none; position:fixed; top:0; left:0; right:0; bottom:0; width:100vw; height:100vh; z-index:99999; background:rgba(0,0,0,.72); align-items:center; justify-content:center; }
  #aidm-thanks-ov.open{ display:flex; }
  #aidm-thanks-card{ background:#141414; border:1px solid var(--line); border-radius:12px; padding:28px 30px; max-width:420px; width:90%; text-align:center; }
  #aidm-thanks-card h3{ margin:0 0 10px; font-size:20px; color:var(--ink); }
  #aidm-thanks-card p{ margin:0 0 20px; font-size:14px; line-height:1.6; color:var(--ink-dim); }
  #aidm-thanks-card .pw-cta{ width:100%; }
  .aidm-auth-btn{ font-family:var(--ff-mono); font-size:12px; font-weight:600; letter-spacing:.03em; text-transform:uppercase; background:var(--amber); color:#1a1408; border:none; padding:9px 16px; cursor:pointer; }
  .aidm-auth-btn:hover{ background:#f5b657; }
  .aidm-auth-email{ font-family:var(--ff-mono); font-size:11px; color:var(--ink-dim); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .aidm-auth-out{ font-family:var(--ff-mono); font-size:11px; color:var(--ink-dim); background:none; border:1px solid var(--line); padding:7px 12px; cursor:pointer; text-transform:uppercase; }
  .aidm-auth-out:hover{ color:var(--ink); border-color:var(--ink-dim); }

  #aidm-auth-ov{ position:fixed; inset:0; z-index:10001; background:rgba(8,8,8,.82); backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; padding:16px; }
  #aidm-auth-ov.open{ display:flex; }
  #aidm-auth-panel{ width:min(400px,100%); background:var(--bg); color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:26px; font-family:system-ui,sans-serif; }
  #aidm-auth-panel h3{ margin:0 0 4px; font-size:19px; }
  #aidm-auth-panel p.sub{ margin:0 0 18px; font-size:13px; color:var(--ink-dim); }
  #aidm-auth-panel input{ width:100%; box-sizing:border-box; background:#0f0f10; color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:11px 12px; font-size:14px; margin-bottom:10px; }
  #aidm-auth-panel input:focus{ outline:none; border-color:var(--amber); }
  #aidm-auth-go{ width:100%; font-family:var(--ff-mono); font-size:13px; font-weight:700; text-transform:uppercase; background:var(--amber); color:#1a1408; border:none; padding:12px; cursor:pointer; margin-top:4px; }
  #aidm-auth-go:disabled{ opacity:.5; cursor:not-allowed; }
  #aidm-auth-toggle{ margin-top:14px; font-size:13px; color:var(--ink-dim); text-align:center; }
  #aidm-auth-toggle a{ color:var(--amber); cursor:pointer; text-decoration:underline; }
  #aidm-auth-forgot{ margin-top:10px; font-size:12px; text-align:center; }
  #aidm-auth-forgot a{ color:var(--ink-dim); cursor:pointer; text-decoration:underline; }
  #aidm-auth-forgot a:hover{ color:var(--amber); }
  #aidm-perks{ background:#0f0f10; border:1px solid var(--line); border-radius:6px; padding:14px 16px; margin-bottom:18px; }
  .aidm-perk{ display:flex; gap:10px; align-items:flex-start; font-size:13px; color:var(--ink-dim); line-height:1.5; padding:3px 0; }
  .aidm-perk span{ color:var(--amber); flex-shrink:0; width:14px; }
  .aidm-perk b{ color:var(--ink); font-weight:600; }
  #aidm-auth-msg{ font-size:13px; margin-top:12px; min-height:18px; word-break:break-word; }
  #aidm-auth-close{ float:right; background:none; border:none; color:var(--ink-dim); font-size:16px; cursor:pointer; margin-top:-6px; }
  #aidm-auth-google{ width:100%; box-sizing:border-box; display:flex; align-items:center; justify-content:center; gap:10px; background:#fff; color:#1f1f1f; border:1px solid var(--line); border-radius:6px; padding:11px 12px; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:14px; font-family:system-ui,sans-serif; }
  #aidm-auth-google:hover{ background:#f2f2f2; }
  #aidm-auth-google:disabled{ opacity:.5; cursor:not-allowed; }
  #aidm-auth-or{ display:flex; align-items:center; text-align:center; color:var(--ink-dim); font-size:12px; margin:0 0 14px; }
  #aidm-auth-or::before, #aidm-auth-or::after{ content:''; flex:1; height:1px; background:var(--line); }
  #aidm-auth-or span{ padding:0 12px; }
  #aidm-auth-code{ letter-spacing:.4em; text-align:center; font-size:18px; font-family:var(--ff-mono); }
</style>

<div id="aidm-auth-ov">
  <div id="aidm-auth-panel">
    <button id="aidm-auth-close">&#10005;</button>
    <h3 id="aidm-auth-title">Sign in</h3>
    <p class="sub" id="aidm-auth-sub">Sign in to save your casts and membership.</p>

    <div id="aidm-perks">
      <div class="aidm-perk" id="aidm-perk-1"><span>&#9733;</span> <b>5 free casts</b> — star yourself in any shot</div>
      <div class="aidm-perk" id="aidm-perk-2"><span>&#8681;</span> Download your clips and stills</div>
      <div class="aidm-perk" id="aidm-perk-3"><span>&#9635;</span> Save your faces for one-tap casting</div>
    </div>

    <button id="aidm-auth-google" type="button">
      <svg width="16" height="16" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.6 2.4 30.1 0 24 0 14.6 0 6.4 5.4 2.6 13.3l7.9 6.1C12.4 13.7 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.6c0-1.6-.1-2.8-.4-4.1H24v7.8h12.4c-.3 2.1-1.6 5.2-4.6 7.3l7.1 5.5c4.3-4 6.8-9.8 6.8-16.5z"/><path fill="#FBBC05" d="M10.5 28.6c-.5-1.4-.8-2.9-.8-4.6s.3-3.2.8-4.6l-7.9-6.1C1 16.5 0 20.1 0 24s1 7.5 2.6 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.1 0 11.3-2 15-5.5l-7.1-5.5c-2 1.4-4.6 2.3-7.9 2.3-6.3 0-11.6-4.2-13.5-9.9l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
      Continue with Google
    </button>
    <div id="aidm-auth-or"><span>or</span></div>

    <input id="aidm-auth-email" type="email" placeholder="Email" autocomplete="email">
    <input id="aidm-auth-pass" type="password" placeholder="Password" autocomplete="current-password">
    <input id="aidm-auth-pass2" type="password" placeholder="Confirm new password" autocomplete="new-password" style="display:none;">
    <input id="aidm-auth-code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="6-digit code" maxlength="6" style="display:none;">
    <button id="aidm-auth-go">Sign in</button>
    <div id="aidm-auth-msg"></div>
    <div id="aidm-auth-forgot"><a id="aidm-auth-forgot-link">Forgot your password?</a></div>
    <div id="aidm-auth-toggle">New here? <a id="aidm-auth-switch">Create an account</a></div>
  </div>
</div>

<script>
(function(){
  var SUPABASE_URL = 'https://mrgcjzmtszmtsqgalfwq.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_b2UBIEMmcP2jy4iC2HehXg_T-OiKa4b';

  var anonId = localStorage.getItem('aidm_uid');
  if(!anonId){ anonId = 'anon_'+(crypto.randomUUID?crypto.randomUUID():(Date.now()+'_'+Math.random())); localStorage.setItem('aidm_uid', anonId); }
  var currentUser = null;
  // Available to the cast widget so a logged-in user's real id is used.
  window.AIDM_getUserId = function(){ return (currentUser && currentUser.id) || anonId; };
  window.AIDM_getUser = function(){ return currentUser; };

  function boot(){
    if(!window.supabase){ setTimeout(boot, 200); return; }
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    window.AIDM_SB = sb;

    var $ = function(id){ return document.getElementById(id); };
    var mode = 'signin';
    var pendingEmail = '';

    var slate = document.querySelector('.slate-top');
    var authWrap = document.createElement('div'); authWrap.id = 'aidm-auth';
    if(slate){ slate.appendChild(authWrap); }

    function renderHeader(){
      if(currentUser){
        authWrap.innerHTML = '<span class="aidm-balance" id="aidm-balance" title="Casts available"></span><button class="aidm-assets-btn">My assets</button><span class="aidm-auth-email"></span><button class="aidm-auth-out">Sign out</button>';
        authWrap.querySelector('.aidm-auth-email').textContent = currentUser.email || 'Account';
        if(window.AIDM_refreshBalance) window.AIDM_refreshBalance();
        authWrap.querySelector('.aidm-auth-out').onclick = function(){ sb.auth.signOut(); };
        authWrap.querySelector('.aidm-assets-btn').onclick = function(){
          if (window.AIDM_track) window.AIDM_track('open_assets', {});
          if (window.AIDM_openAssets) window.AIDM_openAssets();
        };
      } else {
        authWrap.innerHTML = '<button class="aidm-auth-btn">Sign in</button>';
        authWrap.querySelector('.aidm-auth-btn').onclick = openModal;
      }
    }

    var ov = $('aidm-auth-ov');
    var openContext = null; // 'cast' when opened from the Star button
    function openModal(ctx){
      openContext = (typeof ctx === 'string') ? ctx : null;
      mode = openContext === 'cast' ? 'signup' : 'signin';
      applyMode(); $('aidm-auth-msg').textContent=''; ov.classList.add('open');
    }
    window.AIDM_openAuth = openModal;
    function closeModal(){ ov.classList.remove('open'); }
    $('aidm-auth-close').onclick = closeModal;
    ov.onclick = function(e){ if(e.target===ov) closeModal(); };

    function bindSwitch(){
      var sw = $('aidm-auth-switch');
      if(sw) sw.onclick = (mode==='verify')
        ? doResend
        : function(){ mode = (mode==='signin'?'signup':'signin'); applyMode(); };
      var fg = $('aidm-auth-forgot-link');
      if(fg) fg.onclick = function(){ mode = 'reset'; applyMode(); };
    }
    async function doResend(){
      var msg = $('aidm-auth-msg');
      if(!pendingEmail){ mode='signup'; applyMode(); return; }
      msg.style.color='var(--ink-dim)'; msg.textContent='Sending a new code\u2026';
      try{
        var rr = await sb.auth.resend({ type:'signup', email: pendingEmail });
        if(rr.error) throw rr.error;
        msg.style.color='var(--amber)'; msg.textContent='New code sent. Check your email.';
      }catch(err){ msg.style.color='#e0473c'; msg.textContent=(err&&err.message)||'Could not resend the code.'; }
    }
    function applyMode(){
      var perks = $('aidm-perks'), pass = $('aidm-auth-pass'), pass2 = $('aidm-auth-pass2'),
          email = $('aidm-auth-email'), code = $('aidm-auth-code'),
          google = $('aidm-auth-google'), orDiv = $('aidm-auth-or'),
          forgot = $('aidm-auth-forgot'), toggle = $('aidm-auth-toggle');
      $('aidm-auth-msg').textContent = '';
      pass2.style.display = 'none';
      email.style.display = 'block';
      code.style.display = 'none';
      var showGoogle = (mode==='signin' || mode==='signup');
      google.style.display = showGoogle ? 'flex' : 'none';
      orDiv.style.display = showGoogle ? 'flex' : 'none';

      if(mode==='newpass'){
        $('aidm-auth-title').textContent = 'Set a new password';
        $('aidm-auth-sub').textContent = 'Choose a new password for your account.';
        perks.style.display = 'none';
        email.style.display = 'none';
        pass.style.display = 'block';
        pass.setAttribute('autocomplete','new-password');
        pass.placeholder = 'New password';
        pass2.style.display = 'block';
        $('aidm-auth-go').textContent = 'Update password';
        forgot.style.display = 'none';
        toggle.innerHTML = '';
      } else if(mode==='signup'){
        if(openContext==='like'){
          $('aidm-auth-title').textContent = 'Save the shots you love';
          $('aidm-auth-sub').textContent = 'Create a free account to keep your liked shots — and start casting.';
        } else if(openContext==='cast'){
          $('aidm-auth-title').textContent = 'Create an account to cast';
          $('aidm-auth-sub').textContent = 'Free to join. Your first five casts are on us.';
        } else {
          $('aidm-auth-title').textContent = 'Create account';
          $('aidm-auth-sub').textContent = 'Create an account to start casting yourself into shots.';
        }
        perks.style.display = 'block';
        if(openContext==='like'){
          $('aidm-perk-1').innerHTML = '<span>\u2665</span> <b>Save every shot you like</b> \u2014 build your collection';
          $('aidm-perk-2').innerHTML = '<span>\u2605</span> <b>5 free casts</b> \u2014 star yourself in any shot';
          $('aidm-perk-3').innerHTML = '<span>\u2193</span> Download your clips and stills';
        } else {
          $('aidm-perk-1').innerHTML = '<span>\u2605</span> <b>5 free casts</b> \u2014 star yourself in any shot';
          $('aidm-perk-2').innerHTML = '<span>\u2193</span> Download your clips and stills';
          $('aidm-perk-3').innerHTML = '<span>\u25A3</span> Save your faces for one-tap casting';
        }
        pass.style.display = 'block';
        pass.placeholder = 'Password';
        pass.setAttribute('autocomplete','new-password');
        $('aidm-auth-go').textContent = openContext==='like'
          ? 'Create free account'
          : 'Create account — 5 free casts';
        forgot.style.display = 'none';
        toggle.innerHTML = 'Have an account? <a id="aidm-auth-switch">Sign in</a>';
      } else if(mode==='verify'){
        $('aidm-auth-title').textContent = 'Enter your code';
        $('aidm-auth-sub').textContent = 'We sent a 6-digit code to ' + (pendingEmail || 'your email') + '.';
        perks.style.display = 'none';
        email.style.display = 'none';
        pass.style.display = 'none';
        code.style.display = 'block';
        $('aidm-auth-go').textContent = 'Verify & continue';
        forgot.style.display = 'none';
        toggle.innerHTML = 'Didn\u2019t get it? <a id="aidm-auth-switch">Resend code</a>';
      } else if(mode==='reset'){
        $('aidm-auth-title').textContent = 'Reset your password';
        $('aidm-auth-sub').textContent = 'Enter your email and we\u2019ll send you a reset link.';
        perks.style.display = 'none';
        pass.style.display = 'none';
        $('aidm-auth-go').textContent = 'Send reset link';
        forgot.style.display = 'none';
        toggle.innerHTML = 'Remembered it? <a id="aidm-auth-switch">Sign in</a>';
      } else {
        $('aidm-auth-title').textContent = 'Sign in';
        $('aidm-auth-sub').textContent = 'Welcome back.';
        perks.style.display = 'none';
        pass.style.display = 'block';
        pass.placeholder = 'Password';
        pass.setAttribute('autocomplete','current-password');
        $('aidm-auth-go').textContent = 'Sign in';
        forgot.style.display = 'block';
        toggle.innerHTML = 'New here? <a id="aidm-auth-switch">Create an account — 5 free casts</a>';
      }
      bindSwitch();
    }
    bindSwitch();

    $('aidm-auth-go').onclick = async function(){
      var email = $('aidm-auth-email').value.trim();
      var pass = $('aidm-auth-pass').value;
      var msg = $('aidm-auth-msg');

      if(mode==='newpass'){
        var p2 = $('aidm-auth-pass2').value;
        if(!pass || pass.length < 6){ msg.style.color='var(--amber)'; msg.textContent='Password must be at least 6 characters.'; return; }
        if(pass !== p2){ msg.style.color='var(--amber)'; msg.textContent='Passwords don\u2019t match.'; return; }
        $('aidm-auth-go').disabled = true; msg.style.color='var(--ink-dim)'; msg.textContent='Working\u2026';
        try{
          var up = await sb.auth.updateUser({ password: pass });
          if(up.error) throw up.error;
          msg.style.color='var(--amber)'; msg.textContent='Password updated. You\u2019re signed in.';
          setTimeout(closeModal, 1200);
        }catch(err){
          msg.style.color='#e0473c'; msg.textContent = (err && err.message) || 'Could not update password.';
        }finally{ $('aidm-auth-go').disabled = false; }
        return;
      }

      if(mode==='verify'){
        var otpCode = $('aidm-auth-code').value.trim();
        if(!/^\d{6}$/.test(otpCode)){ msg.style.color='var(--amber)'; msg.textContent='Enter the 6-digit code from your email.'; return; }
        $('aidm-auth-go').disabled = true; msg.style.color='var(--ink-dim)'; msg.textContent='Verifying\u2026';
        try{
          var vr = await sb.auth.verifyOtp({ email: pendingEmail, token: otpCode, type: 'signup' });
          if(vr.error) throw vr.error;
          if(window.AIDM_track) window.AIDM_track('signup_verified', { from: openContext || 'header' });
          closeModal();
        }catch(err){
          msg.style.color='#e0473c'; msg.textContent = (err && err.message) || 'That code didn\u2019t work \u2014 try again or resend.';
        }finally{ $('aidm-auth-go').disabled = false; }
        return;
      }

      if(!email){ msg.style.color='var(--amber)'; msg.textContent='Enter your email.'; return; }
      if(mode!=='reset' && !pass){ msg.style.color='var(--amber)'; msg.textContent='Enter your password.'; return; }

      $('aidm-auth-go').disabled = true; msg.style.color='var(--ink-dim)'; msg.textContent='Working\u2026';
      try{
        if(mode==='reset'){
          var rr = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin });
          if(rr.error) throw rr.error;
          msg.style.color='var(--amber)';
          msg.textContent='Check your email for a reset link.';
        } else if(mode==='signin'){
          var r = await sb.auth.signInWithPassword({ email:email, password:pass });
          if(r.error) throw r.error;
          closeModal();
        } else {
          var r2 = await sb.auth.signUp({ email:email, password:pass });
          if(r2.error) throw r2.error;
          if(window.AIDM_track) window.AIDM_track('signup', { from: openContext || 'header' });
          if(r2.data && r2.data.session){ closeModal(); }
          else {
            pendingEmail = email;
            mode = 'verify'; applyMode();
            $('aidm-auth-msg').style.color='var(--amber)';
            $('aidm-auth-msg').textContent='We sent a 6-digit code to '+email+'.';
          }
        }
      }catch(err){
        msg.style.color='#e0473c'; msg.textContent = (err && err.message) || 'Something went wrong.';
      }finally{
        $('aidm-auth-go').disabled = false;
      }
    };

    var gbtn = $('aidm-auth-google');
    if(gbtn) gbtn.onclick = async function(){
      var msg = $('aidm-auth-msg');
      msg.style.color='var(--ink-dim)'; msg.textContent='Opening Google\u2026';
      try{
        if(window.AIDM_track) window.AIDM_track('signup_google_click', { from: openContext || 'header' });
        var g = await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: window.location.origin } });
        if(g.error) throw g.error;
      }catch(err){ msg.style.color='#e0473c'; msg.textContent=(err&&err.message)||'Google sign-in isn\u2019t available right now.'; }
    };

    function aidmRenderBalance(txt){ var el=document.getElementById('aidm-balance'); if(el) el.textContent=txt; }
    window.AIDM_refreshBalance = function(){
      if(!currentUser || !window.AIDM_SB){ aidmRenderBalance(''); return Promise.resolve(null); }
      return window.AIDM_SB.from('profiles').select('is_member,casts_used,cast_credits').eq('id', currentUser.id).single()
        .then(function(r){ var p=r&&r.data; if(!p){ aidmRenderBalance(''); return null; }
          if(p.is_member){ aidmRenderBalance('\u2605 Member'); return { member:true, total:null }; }
          var free=Math.max(0,5-(p.casts_used||0)); var total=free+(p.cast_credits||0);
          aidmRenderBalance(total+(total===1?' cast':' casts')); return { free:free, credits:(p.cast_credits||0), total:total }; })
        .catch(function(){ aidmRenderBalance(''); return null; });
    };
    function aidmMaybeThanks(){
      try{ var params=new URLSearchParams(window.location.search);
        if(params.get('purchased')!=='1') return;
        var ov=document.getElementById('aidm-thanks-ov'), go=document.getElementById('aidm-thanks-go'), msg=document.getElementById('aidm-thanks-msg'); if(ov) ov.classList.add('open'); if(go) go.onclick=function(){ if(ov) ov.classList.remove('open'); };
        function show(){ if(ov) ov.classList.add('open'); }
        if(window.AIDM_refreshBalance){ window.AIDM_refreshBalance().then(function(b){
          if(msg&&b&&b.total!=null){ msg.textContent='You\u2019ve got '+b.total+' cast'+(b.total===1?'':'s')+' ready \u2014 keep casting.'; }
          show(); }); } else { show(); }
        if(go) go.onclick=function(){ if(ov) ov.classList.remove('open'); };
        history.replaceState({}, '', window.location.pathname);
      }catch(e){}
    }
    sb.auth.getSession().then(function(r){ currentUser = r.data.session ? r.data.session.user : null; renderHeader(); aidmMaybeThanks(); });
    sb.auth.onAuthStateChange(function(evt, session){
      var prevId = currentUser ? currentUser.id : null;
      var wasSignedIn = !!currentUser;
      currentUser = session ? session.user : null;
      var nextId = currentUser ? currentUser.id : null;

      if (evt === 'PASSWORD_RECOVERY'){
        mode = 'newpass'; applyMode(); ov.classList.add('open');
      } else if (!wasSignedIn && currentUser && window.AIDM_track){
        window.AIDM_track('signin', {});
      }
      // TOKEN_REFRESHED / focus events fire with the same user — don't touch
      // the DOM then, or open modals get disturbed.
      if (prevId !== nextId) renderHeader();
    });
    // Fallback: some browsers fire recovery before the listener attaches.
    if (location.hash && location.hash.indexOf('type=recovery') !== -1){
      mode = 'newpass'; applyMode(); ov.classList.add('open');
    }

    renderHeader();
  }
  boot();
})();
</script>
<!-- ===== END SUPABASE AUTH ===== -->
